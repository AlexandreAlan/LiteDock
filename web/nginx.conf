server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → API Fastify (sem o prefixo /api)
    location /api/ {
        proxy_pass         http://litedock-api:8088/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA: qualquer rota desconhecida devolve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome (gerados pelo Vite)
    location ~* \.(?:js|css|woff2?|svg|png|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
